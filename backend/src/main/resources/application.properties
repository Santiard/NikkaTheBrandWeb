# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR
# ===================================================================
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS DE DESARROLLO (H2 EN MEMORIA)
# ===================================================================
# Esta base de datos funciona "out-of-the-box" sin que tengas que instalar nada.
spring.datasource.url=jdbc:h2:mem:nikkadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS LOCAL (POSTGRESQL)
# ===================================================================
# Descomenta estas líneas si quieres usar tu PostgreSQL instalado localmente.
# Asegúrate de crear primero la base de datos "nikka_db" en PostgreSQL.
# spring.datasource.url=jdbc:postgresql://localhost:5432/nikka_db
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres123

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# "update" creará automáticamente las tablas en tu DB local al iniciar Spring Boot.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN DE SPRING SECURITY
# ===================================================================
# Deshabilitar seguridad básica temporalmente para desarrollo o configurar permit-all
# spring.security.user.name=admin
# spring.security.user.password=admin123
